<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" width="280" height="48">
  <defs>
    <rect id="bg" width="280" height="48" rx="6" ry="6" fill="#2D2D2D" stroke="#555" stroke-width="1"/>
    <clipPath id="clip"><rect x="0" y="0" width="280" height="48" rx="6"/></clipPath>
  </defs>

  <!-- 背景 -->
  <use href="#bg"/>

  <!-- 色块 + 边框 -->
  <rect x="16" y="14" width="20" height="20" rx="3" fill="#4A90D9" stroke="#888" stroke-width="1"/>

  <!-- 色块内高光 -->
  <rect x="18" y="16" width="8" height="4" rx="1" fill="rgba(255,255,255,0.15)"/>

  <!-- 分隔线 -->
  <line x1="48" y1="10" x2="48" y2="38" stroke="#444" stroke-width="1"/>

  <!-- Hex 文本 -->
  <text x="60" y="28" font-family="Consolas, monospace" font-size="13" fill="#E0E0E0">#4A90D9</text>

  <!-- 右侧箭头（展开指示） -->
  <polygon points="256,18 264,24 256,30" fill="#888"/>
</svg>
